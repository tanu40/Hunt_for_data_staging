<!DOCTYPE html>

    body {
      background: radial-gradient(circle at 20% 30%, #0b1a2f, #030712);

      margin: 0;

    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #ff9f4b, #ff5e00);

      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
      letter-spacing: 1px;
    }
    .subtitle {
      text-align: center;
      color: #b0c7e0;
      margin-bottom: 1.8rem;
      border-bottom: 1px dashed #3f4d63;
      padding-bottom: 1rem;
      font-style: italic;
    }
    .panel {
      background: rgba(8, 18, 33, 0.7);

      border-radius: 1.8rem;
      padding: 1.7rem;
      border: 1px solid #2d405b;
      margin-bottom: 1.8rem;

    .hidden {

    }
    .flex-row {

      gap: 1.2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    input, button {
      background: #152238;
      border: 1px solid #3e5570;
      border-radius: 2rem;
      padding: 0.7rem 1.3rem;
      color: #eaf2ff;
      font-weight: 500;
      outline: none;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    input:focus {

      box-shadow: 0 0 14px #ff6a1a;
    }

      align-items: center;

    }
    button:hover {
      background: #2c456b;
      border-color: #ffaa5e;
      box-shadow: 0 0 18px #ff7730;
    }
    .task-card {
      background: #0a1422;
      border-left: 6px solid #ff8c42;
      padding: 1.2rem;
      border-radius: 1.3rem;
      margin: 1.2rem 0;
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .log-line {
      background: #020b17;
      border: 1px solid #2a3d59;
      padding: 0.5rem 1rem;
      border-radius: 0.6rem;
      margin: 0.4rem 0;
      font-family: 'Fira Code', monospace;
      font-size: 0.78rem;
      white-space: pre-wrap;
      color: #cbd9ff;
    }
    .badge {
      background: #2b3d5c;
      padding: 0.2rem 0.9rem;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .heatmap-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin: 0.8rem 0;
      padding: 0.5rem;
      background: #020b17;
      border-radius: 0.8rem;
      border: 1px solid #2a3d59;
    }
    .heat-cell {
      width: 24px;
      height: 24px;
      border-radius: 3px;
      transition: 0.3s;
      cursor: default;
    }
    .heat-cell:hover {
      transform: scale(1.3);
      z-index: 2;
      box-shadow: 0 0 8px #ff8c42;
    }
    .flag-box {
      background: #0b1c2e;
      border: 2px dashed #ffb347;
      padding: 0.9rem;
      border-radius: 20px;
      text-align: center;
      font-weight: bold;
      font-size: 1.4rem;
      letter-spacing: 3px;
      color: #ffc164;
      animation: pulse 1.7s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 5px #ff9900; }
      50% { box-shadow: 0 0 28px #ff8800; }
      100% { box-shadow: 0 0 5px #ff9900; }
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.8rem;
    }
    th {
      text-align: left;
      color: #ffb26e;
      border-bottom: 1px solid #3d506b;
      padding: 0.4rem;
    }
    td {
      padding: 0.4rem;
      border-bottom: 1px solid #1f3148;
    }
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1a2a1a;
      border: 1px solid #f07b3b;
      padding: 1rem 1.5rem;
      border-radius: 2rem;
      color: #ffc164;
      font-weight: bold;
      z-index: 9999;
      animation: slideIn 0.3s ease, fadeOut 0.3s 2.5s forwards;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-10px); }
    }
    code {
      background: #0d1a26;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-family: 'Fira Code', monospace;
    }
    .timeline-bar {
      display: flex;
      align-items: center;
      gap: 2px;
      margin: 0.5rem 0;
      height: 40px;
      background: #020b17;
      border-radius: 8px;
      padding: 4px;
      border: 1px solid #2a3d59;
    }
    .timeline-event {
      height: 100%;
      border-radius: 3px;
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }
    .timeline-event:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #0a1422;
      border: 1px solid #ff8c42;
      padding: 0.3rem 0.6rem;
      border-radius: 12px;
      font-size: 0.7rem;
      white-space: nowrap;
      z-index: 10;
      color: #ffc164;
    }
  </style>
</head>

    initializeStorage();

    // ============ STATE ============

    // ============ TASKS ============

    // ============ HELPERS ============
    function getStudents() {
      try { return JSON.parse(localStorage.getItem(STUDENTS_DB_KEY) || '[]'); }
      catch(e) { return []; }
    }
    
    function saveStudents(arr) { 
      localStorage.setItem(STUDENTS_DB_KEY, JSON.stringify(arr)); 
    }
    
    function getStudentPassword() { 
      return localStorage.getItem(STUDENT_PASS_KEY) || DEFAULT_STUDENT_PASS; 
    }
    
    function getAdminPassword() { 
      return localStorage.getItem(ADMIN_PASS_KEY) || DEFAULT_ADMIN_PASS; 
    }

    function showToast(message, isError = false) {
      const existingToast = document.querySelector('.toast');
      if (existingToast) existingToast.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.background = isError ? '#3a1a1a' : '#1a2a1a';
      toast.style.borderColor = isError ? '#aa3030' : '#f07b3b';
      toast.style.color = isError ? '#ffaaaa' : '#ffc164';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, 3000);
    }

    function updateCompletion(name, taskId) {
      let students = getStudents();
      let s = students.find(s => s.name.toLowerCase() === name.toLowerCase());
      if (s && !s.completedTasks.includes(taskId)) {
        s.completedTasks.push(taskId);
        saveStudents(students);
        if (currentUser && currentUser.name.toLowerCase() === name.toLowerCase()) {
          currentUser.completedTasks = [...s.completedTasks];
        }
        return true;
      }
      return false;
    }

    // ============ RENDER ============
    function renderTasks() {
      if (!currentUser) return;
      document.getElementById('displayStudentName').innerText = currentUser.name;
      const container = document.getElementById('taskContainer');
      const completed = currentUser.completedTasks || [];
      
      let html = '<h3 style="margin-bottom:1rem;">📊 File Creation Timeline & Heatmap</h3>';
      
      // Animated heatmap
      html += '<div class="heatmap-grid">';
      for (let i = 0; i < 62; i++) {
        const intensity = Math.floor(Math.random() * 60 + 40);
        const red = Math.floor(200 + intensity * 0.5);
        const green = Math.floor(80 + intensity * 0.8);
        html += `<div class="heat-cell" style="background:rgb(${red},${green},25);" title="File creation #${i+1}: ${sysmonLogs[i]?.split('|')[1]?.trim() || 'staging file'}"></div>`;
      }
      html += '</div>';
      html += '<p style="font-size:0.75rem; color:#8da0c0; margin-bottom:0.5rem;">▲ Heatmap: 62 file creations in staging folder (darker = more recent burst)</p>';

      // Timeline bar visualization
      html += '<div class="timeline-bar">';
      for (let i = 0; i < 62; i++) {
        const height = Math.floor(Math.random() * 60 + 40);
        html += `<div class="timeline-event" data-tooltip="File: ${sysmonLogs[i]?.split('|')[1]?.trim().split('\\').pop() || 'file'}" style="width:${100/62}%; height:${height}%; background:rgb(255,${100 + Math.floor(Math.random()*80)},30);"></div>`;
      }
      html += '</div>';
      html += '<p style="font-size:0.75rem; color:#8da0c0; margin-bottom:1rem;">⏱️ Timeline: each bar = one file creation event (hover for details)</p>';

      tasks.forEach(task => {
        const done = completed.includes(task.id);
        html += `<div class="task-card" style="border-left-color: ${done ? '#2ecc71' : '#ff8c42'}; animation-delay: ${task.id * 0.1}s;">`;
        html += `<strong>${task.title}</strong> <span class="badge">${done ? '✅ Complete' : '🔒 Pending'}</span>`;
        html += `<p style="margin:0.4rem 0;">${task.desc}</p>`;

        if (task.extra === 'logs') {
          html += '<div class="log-line">📄 Sysmon Event 11 samples (first 8 of 62):</div>';
          sysmonLogs.slice(0, 8).forEach(l => {
            html += `<div class="log-line">${l}</div>`;
          });
          html += '<div class="log-line">... (54 more entries in C:\\Users\\Public\\staging\\)</div>';
        } else if (task.extra === 'count') {
          html += `<div class="log-line">🔢 Total staging file creations in 10-minute window: <span style="color:#ff8c42; font-weight:bold;">${sysmonLogs.length}</span></div>`;
          html += '<div class="log-line">⏰ Timeframe: 14:23:01 - 14:33:00 (10 minutes)</div>';
          html += '<div class="log-line">📈 Rate: ~6.2 files per minute (suspicious burst)</div>';
        } else if (task.extra === 'compress') {
          html += '<div class="log-line" style="border-left: 3px solid #ff8c42;">⚙️ Process Creation Event:</div>';

          html += `<div style="display:flex; gap:0.5rem; align-items:center; margin-top:0.5rem;">`;

        } else {
          html += `<p style="color:#9effb7; font-weight:bold;">✔ Task Completed Successfully</p>`;

    window.submitTask = function(taskId) {
      if (!currentUser) return;
      const input = document.getElementById(`answerInput${taskId}`);
      if (!input) return;
      const ans = input.value.trim();
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      
      if (ans.toLowerCase() === task.answer.toLowerCase()) {
        const wasNew = updateCompletion(currentUser.name, taskId);
        if (wasNew) {
          showToast('✅ Correct! Task completed successfully.');
        } else {
          showToast('ℹ️ Task was already completed.');
        }
        renderTasks();
      } else {
        showToast('❌ Incorrect answer. Analyze the evidence more carefully.', true);
        input.style.animation = 'shake 0.5s ease';
        setTimeout(() => { input.style.animation = ''; }, 500);
      }
    };

    function renderAdminList() {
      const students = getStudents();
      const cont = document.getElementById('adminStudentList');
      if (!cont) return;
      
      document.getElementById('currentStudentPassDisplay').textContent = getStudentPassword();
      document.getElementById('currentAdminPassDisplay').textContent = getAdminPassword();
      
      if (students.length === 0) {
        cont.innerHTML = '<p style="color:#8da0c0;">📭 No students have logged in yet.</p>';
        return;
      }
      
      let html = '<table><tr><th>Student Name</th><th>Tasks Completed</th><th>Progress</th><th>Status</th></tr>';
      students.forEach(s => {
        const cnt = (s.completedTasks || []).length;
        const percentage = Math.round((cnt / tasks.length) * 100);
        const statusColor = cnt === tasks.length ? '#2ecc71' : cnt > 0 ? '#f39c12' : '#e74c3c';
        html += `<tr>
          <td>${escapeHtml(s.name)}</td>
          <td>${cnt} / ${tasks.length}</td>
          <td>
            <div style="background:#0d1a26; border-radius:10px; height:8px; width:100px; overflow:hidden;">
              <div style="width:${percentage}%; height:100%; background:${statusColor}; transition: width 0.3s;"></div>
            </div>
          </td>
          <td><span class="status-indicator" style="background:${statusColor};"></span>${cnt === tasks.length ? 'Flag Obtained' : cnt > 0 ? 'In Progress' : 'Not Started'}</td>
        </tr>`;
      });
      html += '</table>';
      cont.innerHTML = html;
    }

    function escapeHtml(t) { 
      return String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); 
    }
